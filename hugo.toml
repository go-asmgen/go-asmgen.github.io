baseURL = "https://go-asmgen.github.io/"
title = "go-asmgen"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

[[params.targets]]
  name = "amd64"
  status = "ready"
  blurb = "Yes, amd64 too — for one uniform builder across every target. SSE float moves, sign/zero-extending sub-word loads. NEON/SSE SIMD via Raw."
  regs = "AX.. / X0.."
[[params.targets]]
  name = "arm64"
  status = "ready"
  blurb = "All ABI0 scalars + struct/slice/string aggregates, and NEON packed ops. The reference target; runtime-proven natively."
  regs = "R0.. / F0.."
[[params.targets]]
  name = "riscv64"
  status = "ready"
  blurb = "Same ABI0 layout as arm64, a different move table (MOV/MOVF/MOVD). Runtime-proven under qemu-user."
  regs = "X0.. / F0.."
[[params.targets]]
  name = "loong64"
  status = "ready"
  blurb = "LoongArch 64-bit — same shared ABI0 layout, a third move table (MOVV/MOVF/MOVD). Runtime-proven under qemu-user."
  regs = "R0.. / F0.."
